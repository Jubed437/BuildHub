name: Keep Render Backend Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Validate healthcheck URL secret
        run: |
          if [ -z "${{ secrets.BACKEND_HEALTHCHECK_URL }}" ]; then
            echo "BACKEND_HEALTHCHECK_URL is not set"
            exit 1
          fi

      - name: Ping backend health endpoint
        run: |
          set -e
          curl -fsS --max-time 20 "${{ secrets.BACKEND_HEALTHCHECK_URL }}" > /dev/null
          echo "Backend ping succeeded"
